title = "zscalerctl gitleaks configuration"
minVersion = "8.30.1"

[extend]
useDefault = true

[[allowlists]]
description = "Intentional redaction test fixtures in security tests."
targetRules = [
  "generic-api-key",
  "jwt",
  "private-key",
]
condition = "AND"
regexTarget = "secret"
# Any Go test file: the regexes below are exact, known fixture canaries, so
# scoping to *_test.go (rather than enumerating each file) lets the fixtures
# through wherever a security test lives without admitting any real secret.
paths = [
  '''_test\.go$''',
]
regexes = [
  '''^A7b9C2d4E6f8G1h3J5k7L9m2N4p6Q8r0S2t4U6v$''',
  '''^0123456789abcdef0123456789abcdef01234567$''',
  '''^abcdefghiJKLMNOP1234567890$''',
  '''^tok_1234567890$''',
  '''^abc123secretkeymaterial$''',
  '''^eyJhbGciOiJIUzI1NiJ9\.eyJzdWIiOiIxMjM0NTY3ODkwIn0\.signaturexyz$''',
  '''^eyJhbGciOiJIUzI1NiJ9\.eyJzY29wZSI6InJlc291cmNlcyJ9\.shapeTestJWTCanary$''',
  '''^eyJhbGciOiJIUzI1NiJ9\.eyJzdWIiOiJjYW5hcnkifQ\.c2VjcmV0LXNpZ25hdHVyZS1jYW5hcnk$''',
  '''(?s)-----BEGIN PRIVATE KEY-----.*key-material.*-----END PRIVATE KEY-----''',
]
