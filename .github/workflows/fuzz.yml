name: fuzz

on:
  schedule:
    - cron: '30 12 * * 3'
  workflow_dispatch:
    inputs:
      fuzztime:
        description: Go fuzz duration per target
        required: false
        default: 10m

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: redact-json
            package: ./internal/redact
            target: FuzzRedactorPreservesValidJSON
          - name: redact-rendered-string
            package: ./internal/redact
            target: FuzzScanRenderedStringRedactsBareHighEntropyCanary
          - name: resources-projection
            package: ./internal/resources
            target: FuzzProjectRecordSubsetAndCanaryRedaction
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: go-cache/fuzz
          key: fuzz-corpus-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.name }}-

      # No continue-on-error: a fuzz crash in the redaction/projection targets
      # is a security regression and must turn the run red (scheduled-workflow
      # failures notify the owner). The collect and upload steps below run via
      # if: always(), so the crashing input is still captured on failure.
      - name: Run fuzz target
        env:
          FUZZ_TIME: ${{ github.event.inputs.fuzztime }}
          GOCACHE: ${{ github.workspace }}/go-cache
        run: |
          set -o pipefail
          fuzz_time="${FUZZ_TIME:-10m}"
          mkdir -p fuzz-artifacts go-cache/fuzz
          go test -mod=vendor "${{ matrix.package }}" -run '^$' -fuzz "^${{ matrix.target }}$" -fuzztime "$fuzz_time" 2>&1 | tee "fuzz-artifacts/${{ matrix.name }}.log"

      - name: Report crash
        if: failure()
        run: |
          echo "::error::fuzz target ${{ matrix.target }} found a failing input; download the fuzz-${{ matrix.name }} artifact and commit the minimized input under the package's testdata/fuzz so it becomes a permanent regression seed"

      - name: Collect fuzz corpus
        if: always()
        run: |
          mkdir -p fuzz-artifacts/testdata
          find internal -path '*/testdata/fuzz/*' -type f -print -exec cp --parents {} fuzz-artifacts/testdata/ \;
          if [ -d go-cache/fuzz ]; then
            cp -R go-cache/fuzz fuzz-artifacts/go-cache-fuzz
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: fuzz-${{ matrix.name }}
          path: fuzz-artifacts
          if-no-files-found: ignore
          # 90 days (the maximum): a crashing input must survive long enough
          # to be noticed and committed as a regression seed, not expire in a
          # week like routine corpus snapshots.
          retention-days: 90
