name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump to release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: read

# Serialize releases: concurrent merges to main must not race on tag creation.
# Do not cancel an in-flight release — let it finish, then run the next.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install Semgrep
        run: python3 -m pip install --user --require-hashes -r .github/requirements/semgrep.txt

      - name: Add user Python bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Determine release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_BUMP: ${{ github.event.inputs.bump }}
          # Permit the 0.x -> 1.0.0 major bump only on an explicit manual
          # dispatch of "major". The push/label path never sets this, so a
          # semver:major label alone can never cut 1.0 — it stays a deliberate
          # human act. See docs/VERSIONING.md.
          ZSCALERCTL_ALLOW_MAJOR_ZERO: ${{ github.event.inputs.bump == 'major' }}
        run: |
          set -euo pipefail
          if [[ -n "${DISPATCH_BUMP:-}" ]]; then
            bump="$DISPATCH_BUMP"
          else
            labels="$(bash scripts/pr-labels-for-commit.sh "$GITHUB_REPOSITORY" "$GITHUB_SHA")"
            ZSCALERCTL_PR_LABELS="$labels" bash scripts/verify-semver-label.sh
            bump="$(printf '%s\n' "$labels" | awk -F: '/^semver:/ {print $2; exit}')"
          fi

          if [[ "$bump" == "none" ]]; then
            echo "release=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          next_version="$(bash scripts/next-version.sh "$bump")"
          echo "release=true" >>"$GITHUB_OUTPUT"
          echo "version=$next_version" >>"$GITHUB_OUTPUT"
          echo "version_no_v=${next_version#v}" >>"$GITHUB_OUTPUT"

      - name: Release gate
        if: steps.version.outputs.release == 'true'
        run: make release-check

      - name: Secret scan
        if: steps.version.outputs.release == 'true'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_VERSION: 8.30.1

      - name: Install SBOM tool
        if: steps.version.outputs.release == 'true'
        env:
          CYCLONEDX_GOMOD_VERSION: v1.10.0
        run: |
          set -euo pipefail
          mkdir -p .release-tools
          GOBIN="$PWD/.release-tools" go install -mod=mod "github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}"
          echo "$PWD/.release-tools" >>"$GITHUB_PATH"

      - name: Build release artifacts
        if: steps.version.outputs.release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_NO_V: ${{ steps.version.outputs.version_no_v }}
        run: |
          set -euo pipefail
          mkdir -p dist
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/dvmrry/zscalerctl/internal/version.version=${VERSION_NO_V} -X github.com/dvmrry/zscalerctl/internal/version.commit=${commit} -X github.com/dvmrry/zscalerctl/internal/version.date=${date}"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$VERSION")"
            if [[ "$tagged_commit" != "$GITHUB_SHA" ]]; then
              echo "tag $VERSION already exists at $tagged_commit, not $GITHUB_SHA" >&2
              exit 1
            fi
          fi
          # cyclonedx-gomod v1.10.0 detects the main module version from Git.
          # Keep the release runner's remote tags untouched, but remove local
          # semver tags so annotated historical tags cannot confuse the detector.
          local_semver_tags="$(git tag --list 'v[0-9]*')"
          if [[ -n "$local_semver_tags" ]]; then
            while IFS= read -r tag; do
              git tag -d "$tag" >/dev/null
            done <<<"$local_semver_tags"
          fi
          git tag "$VERSION"
          cleanup() {
            git tag -d "$VERSION" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            name="zscalerctl_${VERSION_NO_V}_${goos}_${goarch}"
            mkdir -p "dist/$name"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -mod=vendor -trimpath -ldflags "$ldflags" -o "dist/$name/zscalerctl$ext" ./cmd/zscalerctl
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" cyclonedx-gomod app -json -licenses -main cmd/zscalerctl -output "dist/$name.sbom.cdx.json" .
            cp "dist/$name.sbom.cdx.json" "dist/$name/sbom.cdx.json"
            cp LICENSE README.md "dist/$name/"
            tar -C dist -czf "dist/$name.tar.gz" "$name"
            rm -rf "dist/$name"
          done

          (cd dist && shasum -a 256 *.tar.gz *.sbom.cdx.json > SHA256SUMS)

      - name: Attest release artifacts
        if: steps.version.outputs.release == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Publish release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$VERSION")"
            if [[ "$tagged_commit" != "$GITHUB_SHA" ]]; then
              echo "tag $VERSION already exists at $tagged_commit, not $GITHUB_SHA" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "$VERSION"
            git push origin "$VERSION"
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "release already exists: $VERSION" >&2
            exit 1
          fi

          notes_file="docs/releases/${VERSION}.md"
          if [[ -f "$notes_file" ]]; then
            gh release create "$VERSION" dist/* --title "$VERSION" --notes-file "$notes_file"
          else
            gh release create "$VERSION" dist/* --title "$VERSION" --generate-notes
          fi
