name: gosec

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '45 11 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true

      - name: Detect code scanning upload capability
        id: code-scanning
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          body="$(mktemp)"
          status="$(
            curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/analyses?per_page=1" || true
          )"
          if [[ "$status" =~ ^2[0-9][0-9]$ ]]; then
            echo "available=true" >>"$GITHUB_OUTPUT"
          else
            echo "available=false" >>"$GITHUB_OUTPUT"
            first_line="$(tr '\n' ' ' <"$body" | cut -c1-240)"
            echo "::notice::Code scanning SARIF upload is unavailable for ${GITHUB_REPOSITORY} (HTTP ${status}); gosec will still run and upload SARIF as an artifact. ${first_line}"
          fi

      # Advisory, not a merge blocker: findings surface through SARIF when the
      # repository supports code scanning. Scanner execution remains blocking:
      # if gosec cannot run or cannot produce SARIF, this job fails.
      - name: Run gosec
        run: |
          set +e
          go run github.com/securego/gosec/v2/cmd/gosec@v2.26.1 -fmt sarif -out gosec.sarif ./...
          status="$?"
          set -e
          if [[ ! -s gosec.sarif ]]; then
            echo "gosec did not produce SARIF; treating scanner execution as failed" >&2
            if [[ "$status" -eq 0 ]]; then
              exit 1
            fi
            exit "$status"
          fi
          if [[ "$status" -ne 0 ]]; then
            echo "::notice::gosec exited with status ${status}; findings are advisory and recorded in gosec.sarif"
          fi

      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always() && steps.code-scanning.outputs.available == 'true'
        continue-on-error: true
        with:
          sarif_file: gosec.sarif

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 5
