name: codeql

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '45 10 * * 2'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    # Private repositories skip CodeQL by default because code scanning may be
    # unavailable without GitHub Code Security / billing support. Set the
    # repository variable ENABLE_PRIVATE_CODEQL=true to opt in. If branch
    # protection requires this CodeQL check on a private repo, remove or replace
    # that required check unless private CodeQL is explicitly enabled.
    if: ${{ !github.event.repository.private || vars.ENABLE_PRIVATE_CODEQL == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true

      - name: Detect code scanning upload capability
        id: code-scanning
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          body="$(mktemp)"
          status="$(
            curl -sS -o "$body" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/analyses?per_page=1" || true
          )"
          if [[ "$status" =~ ^2[0-9][0-9]$ ]]; then
            echo "available=true" >>"$GITHUB_OUTPUT"
          else
            echo "available=false" >>"$GITHUB_OUTPUT"
            first_line="$(tr '\n' ' ' <"$body" | cut -c1-240)"
            echo "::notice::Code scanning SARIF upload is unavailable for ${GITHUB_REPOSITORY} (HTTP ${status}); CodeQL will still analyze and keep local results as an artifact. ${first_line}"
          fi

      - uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: go
          build-mode: manual

      - run: go test -mod=vendor ./...

      - uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: '/language:go'
          output: codeql-results
          upload: ${{ steps.code-scanning.outputs.available == 'true' && 'always' || 'never' }}
          upload-database: ${{ steps.code-scanning.outputs.available == 'true' && 'true' || 'false' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && steps.code-scanning.outputs.available != 'true'
        with:
          name: codeql-results
          path: codeql-results
          retention-days: 5
