name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: go mod tidy
      - run: go mod vendor
      - run: git diff --exit-code -- go.mod go.sum vendor

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: go test -mod=vendor ./...

  # race is split into shards: internal/cli and internal/resources dominate
  # race time, so they each run as their own job in parallel with the rest.
  race-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: go test -race -mod=vendor ./internal/cli/...

  race-resources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: go test -race -mod=vendor ./internal/resources/...

  # Everything except the two heavy shards above. Computed dynamically so a new
  # package is covered automatically (no coverage gap).
  race-rest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: |
          go list -mod=vendor ./... | grep -vE '/internal/(cli|resources)(/|$)' | xargs go test -race -mod=vendor

  verify-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: make fmt-check
      - run: bash scripts/verify-sdk-boundary.sh
      - run: bash scripts/test-verify-sdk-boundary.sh
      - run: bash scripts/verify-ci-no-live-creds.sh
      - run: bash scripts/test-verify-ci-no-live-creds.sh
      - run: bash scripts/verify-actions-pinned.sh
      - run: bash scripts/test-verify-actions-pinned.sh
      - run: bash scripts/verify-docs.sh
      # These verifiers run in `make check` but were absent from PR CI, so a
      # break in release automation, artifacts, the catalog draft, the resource
      # scaffold, the SDK-surface inventory, or the script registry only
      # surfaced locally. Gate them on PRs too.
      - run: make verify-release-automation
      - run: make verify-release-artifacts
      - run: make verify-catalog-draft
      - run: make verify-resource-scaffold
      - run: make verify-sdk-surface-inventory
      - run: make verify-script-registry

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.4'
          cache: true
      - run: go vet -mod=vendor ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
      - run: staticcheck ./...
      - run: make vuln
      - run: make verify-licenses
      - run: python3 -m pip install --user --require-hashes -r .github/requirements/semgrep.txt
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: bash scripts/verify-semgrep.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_VERSION: 8.30.1

  # Single stable check for branch protection: succeeds only if every job above
  # succeeded. Lets protection require one check instead of tracking each job.
  required:
    if: ${{ always() }}
    needs:
      - mod-integrity
      - unit
      - race-cli
      - race-resources
      - race-rest
      - verify-gates
      - static-analysis
      - secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to succeed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: ${results}"
          for r in ${results}; do
            if [ "${r}" != "success" ]; then
              echo "::error::a required CI job did not succeed"
              exit 1
            fi
          done
