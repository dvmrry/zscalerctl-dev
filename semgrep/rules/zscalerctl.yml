rules:
  - id: zscalerctl.secret-reveal-outside-sdk-boundary
    languages:
      - go
    severity: ERROR
    message: secret.Secret.Reveal() may only be used at the SDK configuration boundary.
    paths:
      exclude:
        - "**/*_test.go"
    patterns:
      - pattern: $SECRET.Reveal()
      - pattern-not-inside: |
          func newSDKConfiguration(...) $RET {
            ...
          }
      - pattern-not-inside: |
          func newLegacyZIAConfiguration(...) $RET {
            ...
          }
  - id: zscalerctl.raw-projection-outside-verify
    languages:
      - go
    severity: ERROR
    message: >-
      resources.ProjectRecord/ProjectRecords are the UNVERIFIED projection
      primitives. Production code must call ProjectRecordAndVerify /
      ProjectRecordsAndVerify so the AssertRenderedSubset allow-list check
      cannot be skipped. Tests may use the raw form.
    paths:
      exclude:
        - "**/*_test.go"
    pattern-either:
      - pattern: resources.ProjectRecord(...)
      - pattern: resources.ProjectRecords(...)
